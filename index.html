<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>謝佳杰的自主訓練系統</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --accent-color: #FF5722;
            --danger-color: #e74c3c;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --purple-color: #9b59b6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        /* 簽到主頁面板 */
        .home-panel {
            background: var(--card-bg);
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            border-top: 6px solid var(--secondary-color);
            text-align: center;
        }

        .welcome-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 8px;
        }

        .today-status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .status-strength { background-color: var(--accent-color); }
        .status-cardio { background-color: var(--purple-color); }
        .status-rest { background-color: var(--primary-color); }
        .status-makeup { background-color: #f1c40f; color: #333; }

        .today-desc {
            font-size: 1.05rem;
            color: #555;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #ddd;
            margin-bottom: 20px;
            text-align: left;
        }

        /* 今日主訓練按鈕 */
        .btn-main-action {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.2s;
            display: none;
            width: 80%;
        }
        .btn-main-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .checkin-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #edf7ed;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: left;
        }

        .btn-checkin {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-checkin:disabled { background-color: #bbb; cursor: not-allowed; }

        .missed-checkbox-area {
            font-size: 0.95rem;
            color: var(--danger-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* 訓練計時器控制面板 */
        .control-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 25px;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-start:hover { background-color: #439a46; transform: translateY(-2px); }
        .btn-start.stop-mode { background-color: var(--danger-color); }
        .btn-start.stop-mode:hover { background-color: #c0392b; }

        .btn-skip {
            background-color: #7f8c8d; color: white; border: none;
            padding: 6px 15px; font-size: 0.9rem; border-radius: 15px;
            cursor: pointer; margin-top: 10px; display: none;
            transition: background 0.2s;
        }

        /* 折返跑專用大計數按鈕 */
        .btn-counter {
            background-color: var(--purple-color);
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin: 15px 0;
            display: none;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .btn-counter:active { transform: scale(0.98); }

        .status-display { margin-top: 15px; display: none; }
        .current-round { font-size: 1.2rem; color: #7f8c8d; font-weight: bold; }
        .current-task { font-size: 1.8rem; color: #2c3e50; font-weight: bold; margin: 10px 0; }
        .timer-countdown { font-size: 4rem; font-weight: bold; color: var(--accent-color); margin: 10px 0; transition: color 0.2s ease; }

        /* 課表清單樣式 */
        .workout-section-title { font-size: 1.3rem; font-weight: bold; color: #2c3e50; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; width: 100%; }
        .workout-list { list-style: none; padding: 0; margin: 0; opacity: 0.8; width: 100%; }
        .workout-item { background: var(--card-bg); border-left: 5px solid #bdc3c7; margin-bottom: 12px; padding: 15px 20px; border-radius: 0 8px 8px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: left; }
        .workout-item.active { border-left-color: var(--accent-color) !important; background: #fff3cd !important; transform: scale(1.02); box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: all 0.3s; }
        .workout-item.active-rest { border-left-color: var(--secondary-color) !important; background: #eef7ff !important; }
        .workout-title { font-size: 1.2rem; font-weight: bold; margin: 0 0 5px 0; display: flex; justify-content: space-between; }
        .workout-count { color: #e67e22; }
        .rest-item .workout-count { color: var(--secondary-color); }
        .workout-desc { font-size: 0.9rem; color: #7f8c8d; margin: 5px 0 0 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🏋️ 謝佳杰的自主訓練系統</h1>

        <!-- 主頁：簽到與今日課表狀態 -->
        <div class="home-panel">
            <div class="welcome-title" id="welcome-date">今天是星期幾</div>
            <div id="today-badge" class="today-status-badge">載入中...</div>
            <div id="today-desc" class="today-desc">課表內容加載中...</div>

            <!-- 智慧引導進入訓練按鈕 -->
            <button id="main-action-btn" class="btn-main-action" onclick="scrollToWorkoutPanel()">進入今日訓練菜單 ➔</button>

            <!-- 簽到功能區 -->
            <div class="checkin-section">
                <div><span id="checkin-status-text">今日尚未簽到 📝</span></div>
                <button id="checkin-btn" class="btn-checkin" onclick="clickCheckIn()">每日簽到</button>
            </div>

            <!-- 測試/補簽警示區 -->
            <div class="missed-checkbox-area">
                <input type="checkbox" id="missed-past-checkbox" onchange="toggleMissedPast(this)">
                <label for="missed-past-checkbox">⚠ 勾選模擬「之前有漏掉簽到」（測試補訓用）</label>
            </div>
        </div>

        <!-- 動態訓練計時控制台主區段 -->
        <div id="timer-container-section" style="display: none;">
            <div class="workout-section-title" id="panel-title-text">⏱ 訓練控制台</div>
            
            <div class="control-panel">
                <button id="start-btn" class="btn-start" onclick="toggleWorkout()">開始練習 🚀</button>
                <div>
                    <button id="skip-btn" class="btn-skip" onclick="skipRest()">跳過休息 ⏩</button>
                    <button id="counter-btn" class="btn-counter" onclick="incrementLaps()">折返跑完成 (目前：0 / 6 趟) 🏃‍♂️</button>
                </div>
                
                <div id="status-area" class="status-display">
                    <div id="round-text" class="current-round">第 1 組</div>
                    <div id="task-text" class="current-task">準備倒數</div>
                    <div id="countdown-text" class="timer-countdown">3</div>
                </div>
            </div>

            <!-- 課表顯示區 (由 JS 根據當天動態渲染清單內容) -->
            <div class="workout-section-title">📋 當前循環動作清單</div>
            <ul class="workout-list" id="workout-container-list"></ul>
        </div>
    </div>

    <script>
        // 菜單 A：核心肌力日課表設定 (3組，第3組免最後休息)
        const strengthConfig = [
            { id: 0, name: "1. 側棒式轉體 (每邊 12 下)", type: "count" },
            { id: 1, name: "2. 休息", type: "timer", duration: 45, restAfter: true, isRestStep: true },
            { id: 2, name: "3. 保加利亞分腿蹲 (每腿 10 下)", type: "count" },
            { id: 3, name: "4. 休息", type: "timer", duration: 45, restAfter: true, isRestStep: true },
            { id: 4, name: "5. 死蟲式 (左右輪流 20 下)", type: "count" },
            { id: 5, name: "6. 休息", type: "timer", duration: 45, restAfter: true, isRestStep: true },
            { id: 6, name: "7. 仰臥捲腹觸膝 (20 下)", type: "count" },
            { id: 7, name: "8. 休息", type: "timer", duration: 45, restAfter: true, isRestStep: true },
            { id: 8, name: "9. 波比跳", type: "timer", duration: 40, exerciseAfter: true },
            { id: 9, name: "10. 休息", type: "timer", duration: 45, isFinalRest: true, restAfter: true, isRestStep: true }
        ];

        // 菜單 B：體能爆汗日課表設定 (4組，第4組不休息)
        const cardioConfig = [
            { id: 0, name: "1. 動態暖身", type: "timer", duration: 300, exerciseAfter: true }, 
            { id: 1, name: "2. 20公尺連續折返跑 (共 6 趟)", type: "lapCounter" },
            { id: 2, name: "3. 登山者式 (Mountain Climbers)", type: "timer", duration: 30, exerciseAfter: true },
            { id: 3, name: "4. 俄羅斯轉體 (左右各 15 下)", type: "count" },
            { id: 4, name: "5. 組間大休息", type: "timer", duration: 180, isFinalRest: true, restAfter: true, isRestStep: true } 
        ];

        // 原始週課表架構
        const originalSchedule = {
            1: { type: "strength", name: "核心肌力日 🔥", desc: "🎯 課表：練核心、雕刻腹肌、練單腳力量。", hasTimer: true, maxRounds: 3, activeConfig: strengthConfig, title: "⏱ 核心下肢循環訓練控制台" },
            2: { type: "rest", name: "完全休息日 💤", desc: "🛌 課表：完全休息。修復是為了走更長遠的路！", hasTimer: false },
            3: { type: "strength", name: "核心肌力日 🔥", desc: "🎯 課表：強化核心剛性，讓肚子跟鋼板一樣硬。", hasTimer: true, maxRounds: 3, activeConfig: strengthConfig, title: "⏱ 核心下肢循環訓練控制台" },
            4: { type: "rest", name: "完全休息日 💤", desc: "🛌 課表：完全休息（保留體能給週末）。", hasTimer: false },
            5: { type: "rest", name: "完全休息日 💤", desc: "🛌 課表：完全休息（保留體能給週末）。", hasTimer: false },
            6: { type: "cardio", name: "體能爆汗日 ⚡", desc: "跑場、操場或開音檔，實地轟炸 20 公尺裁判折返跑（Beep Test）與動態腹肌。", hasTimer: true, maxRounds: 4, activeConfig: cardioConfig, title: "⏱ 體能爆汗折返跑訓練控制台" },
            0: { type: "rest", name: "修復放鬆日 🛁", desc: "🧘 課表：徹底拉伸、泡熱水澡恢復。", hasTimer: false }
        };

        const weekNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        
        // 核心狀態變數
        let todayDay = new Date().getDay(); 
        let activeWorkout = null; 
        let currentRound = 1;
        let currentStepIndex = 0;
        let countdownInterval;
        let isRunning = false;
        let currentLaps = 0; 

        // DOM 元素
        const startBtn = document.getElementById('start-btn');
        const skipBtn = document.getElementById('skip-btn');
        const counterBtn = document.getElementById('counter-btn');
        const statusArea = document.getElementById('status-area');
        const roundText = document.getElementById('round-text');
        const taskText = document.getElementById('task-text');
        const countdownText = document.getElementById('countdown-text');
        const timerSection = document.getElementById('timer-container-section');
        const mainActionBtn = document.getElementById('main-action-btn');
        const listContainer = document.getElementById('workout-container-list');

        window.onload = function() {
            const lastOpenDay = localStorage.getItem('lastOpenDay');
            if (todayDay === 1 && lastOpenDay !== "1") {
                localStorage.removeItem('hasMissedTraining');
            }
            localStorage.setItem('lastOpenDay', todayDay);

            renderSystemPage();
        };

        function renderSystemPage() {
            document.getElementById('welcome-date').textContent = `今天是 ${weekNames[todayDay]}`;
            
            const todayStr = new Date().toDateString();
            const isCheckedInToday = (localStorage.getItem('checkedInDate') === todayStr);
            const hasMissed = (localStorage.getItem('hasMissedTraining') === "true");

            activeWorkout = { ...originalSchedule[todayDay] };

            // 🚨 缺席自動調整機制優化版（較建議此版本）：支援體能爆汗日與核心日的交替補訓
            if (hasMissed && activeWorkout.type === "rest") {
                activeWorkout.type = "makeup";
                activeWorkout.hasTimer = true;

                // 根據休息日的不同，分配不同的補訓課表，達到兩種課表都能補的目的
                if (todayDay === 5 || todayDay === 0) { 
                    // 週五、週日 補「體能爆汗課表」
                    activeWorkout.name = "🚨 缺席補訓日 (體能爆汗補課)";
                    activeWorkout.desc = "⚠ 偵測到本週有天數未落實簽到，系統已為你將休息日調整為「體能爆汗折返跑補訓課表」，把體能進度轟炸回來！";
                    activeWorkout.maxRounds = 4;
                    activeWorkout.activeConfig = cardioConfig;
                    activeWorkout.title = "⏱ 體能爆汗折返跑訓練控制台";
                } else {
                    // 週二、週四 補「核心肌力課表」
                    activeWorkout.name = "🚨 缺席補訓日 (核心下肢補課)";
                    activeWorkout.desc = "⚠ 偵測到本週有天數未落實簽到，系統已為你將休息日調整為「核心下肢補訓課表」，幫你補回核心強度！";
                    activeWorkout.maxRounds = 3;
                    activeWorkout.activeConfig = strengthConfig;
                    activeWorkout.title = "⏱ 核心下肢循環訓練控制台";
                }
            }

            const badge = document.getElementById('today-badge');
            badge.textContent = activeWorkout.name;
            badge.className = "today-status-badge status-" + activeWorkout.type;
            document.getElementById('today-desc').textContent = activeWorkout.desc;

            const checkinBtn = document.getElementById('checkin-btn');
            const checkinText = document.getElementById('checkin-status-text');
            if (isCheckedInToday) {
                checkinBtn.disabled = true;
                checkinBtn.textContent = "已簽到";
                checkinText.innerHTML = "🎉 今日已完成簽到！太棒了！";
                checkinText.style.color = "#27ae60";
            } else {
                checkinBtn.disabled = false;
                checkinBtn.textContent = "每日簽到";
                checkinText.innerHTML = "今日尚未簽到 📝";
                checkinText.style.color = "var(--danger-color)";
            }

            if (activeWorkout.hasTimer) {
                mainActionBtn.style.display = 'inline-block';
                timerSection.style.display = 'block';
                document.getElementById('panel-title-text').textContent = activeWorkout.title;
                buildWorkoutListUI(activeWorkout.activeConfig);
            } else {
                mainActionBtn.style.display = 'none';
                timerSection.style.display = 'none';
            }
        }

        function buildWorkoutListUI(configList) {
            listContainer.innerHTML = "";
            configList.forEach(step => {
                const li = document.createElement('li');
                li.className = "workout-item" + (step.isRestStep ? " rest-item" : "");
                li.id = `item-${step.id}`;
                
                let countText = "";
                let descText = "";
                
                if (activeWorkout.title.includes("體能爆汗")) {
                    // 體能爆汗日文字渲染
                    const cardioDescs = [
                        { count: "5 分鐘", desc: "💡 提示：慢跑、馬克操或動態關節活動，微微出汗預備體能。" },
                        { count: "6 趟", desc: "🏃‍♂️ 提示：實地轟炸 20 公尺裁判折返跑（Beep Test）距離。" },
                        { count: "30 秒", desc: "💡 提示：撐地伏地挺身姿勢，雙腳快速交替往前收至胸前，維持核心穩定。" },
                        { count: "左右各 15 下", desc: "💡 提示：坐在地上軀幹微後仰，雙腳微懸空，雙手左右交替觸地轉體。" },
                        { count: "3 分鐘", desc: "☕ 提示：徹底深呼吸放鬆，補充水分，準備下一組爆發（第4組免休息）。" }
                    ];
                    countText = cardioDescs[step.id].count;
                    descText = cardioDescs[step.id].desc;
                } else {
                    // 核心肌力日文字渲染
                    const strengthDescs = [
                        { count: "每邊 12 下", desc: "💡 提示：手肘撐地維持側棒式，上手往身體下方延伸，再帶回向上延伸。" },
                        { count: "45 秒", desc: "" },
                        { count: "每腿 10 下", desc: "💡 提示：後腳抬高踩在椅面，重心在前腳，垂直下蹲至前大腿與地面平行。" },
                        { count: "45 秒", desc: "" },
                        { count: "左右輪流 20 下", desc: "💡 提示：平躺雙手朝天、雙膝彎曲 90 度。對側手腳同時向外延伸，下背緊貼地面。" },
                        { count: "45 秒", desc: "" },
                        { count: "20 下", desc: "💡 提示：平躺雙腳踩地，吐氣時用腹肌力量將上半身捲起，雙手摸到膝蓋。" },
                        { count: "45 秒", desc: "" },
                        { count: "持續 40 秒", desc: "💡 提示：下蹲後跳、跳回再向上爆發跳躍。請維持固定節奏。" },
                        { count: "45 秒", desc: "第3組免休息" }
                    ];
                    countText = strengthDescs[step.id].count;
                    descText = strengthDescs[step.id].desc;
                }

                li.innerHTML = `
                    <div class="workout-title"><span>${step.name}</span><span class="workout-count">${countText}</span></div>
                    ${descText ? `<p class="workout-desc">${descText}</p>` : ''}
                `;
                listContainer.appendChild(li);
            });
        }

        function scrollToWorkoutPanel() {
            timerSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function clickCheckIn() {
            localStorage.setItem('checkedInDate', new Date().toDateString());
            alert("簽到成功！今天也要保持紀律，繼續加油！🔥");
            renderSystemPage();
        }

        // 模擬漏簽狀態勾選器
        function toggleMissedPast(checkbox) {
            localStorage.setItem('hasMissedTraining', checkbox.checked ? "true" : "false");
            renderSystemPage();
        }

        /* ==================== 計時訓練核心引擎 ==================== */
        function toggleWorkout() {
            if (!isRunning) {
                isRunning = true;
                startBtn.textContent = "停止訓練 ⏹️";
                startBtn.classList.add('stop-mode');
                initWorkout();
            } else {
                resetWorkout();
            }
        }

        function resetWorkout() {
            clearInterval(countdownInterval);
            isRunning = false;
            currentRound = 1;
            currentStepIndex = 0;
            currentLaps = 0;
            startBtn.textContent = "開始練習 🚀";
            startBtn.classList.remove('stop-mode');
            statusArea.style.display = 'none';
            skipBtn.style.display = 'none';
            counterBtn.style.display = 'none';
            clearAllHighlights();
            countdownText.onclick = null;
            countdownText.style.cursor = "default";
        }

        function initWorkout() {
            statusArea.style.display = 'block';
            currentRound = 1;
            currentStepIndex = 0;
            currentLaps = 0;
            clearAllHighlights();
            runPreparation(3, () => {
                executeStep();
            });
        }

        function runPreparation(seconds, callback) {
            taskText.textContent = "準備倒數";
            skipBtn.style.display = 'none';
            counterBtn.style.display = 'none';
            countdownText.style.color = "var(--accent-color)";
            countdownText.textContent = seconds;
            playSound(440, 0.1);

            let sec = seconds;
            countdownInterval = setInterval(() => {
                sec--;
                if (sec > 0) {
                    countdownText.textContent = sec;
                    playSound(440, 0.1);
                } else if (sec === 0) {
                    countdownText.textContent = "開始！";
                    playSound(880, 0.3);
                } else {
                    clearInterval(countdownInterval);
                    callback();
                }
            }, 1000);
        }

        function executeStep() {
            if (currentRound > activeWorkout.maxRounds) {
                endWorkout();
                return;
            }

            const step = activeWorkout.activeConfig[currentStepIndex];

            if (currentRound === activeWorkout.maxRounds && step.isFinalRest) {
                endWorkout();
                return;
            }

            roundText.textContent = `第 ${currentRound} / ${activeWorkout.maxRounds} 組`;
            taskText.textContent = step.name;
            highlightItem(step.id);

            skipBtn.style.display = (step.isRestStep) ? 'inline-block' : 'none';
            
            if (step.type === "lapCounter") {
                counterBtn.style.display = 'inline-block';
                currentLaps = 0;
                counterBtn.textContent = `折返完成 (目前：${currentLaps} / 6 趟) 🏃‍♂️`;
                countdownText.style.color = "var(--purple-color)";
                countdownText.textContent = "RUN!";
                return;
            } else {
                counterBtn.style.display = 'none';
            }

            if (step.type === "timer") {
                let timeLeft = step.duration;
                countdownText.style.color = (timeLeft <= 5) ? "var(--danger-color)" : "var(--accent-color)";
                countdownText.textContent = `${timeLeft}s`;
                
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft > 0) {
                        countdownText.textContent = `${timeLeft}s`;
                        if (timeLeft <= 5) {
                            countdownText.style.color = "var(--danger-color)";
                            playSound(550, 0.1);
                        }
                    } else {
                        clearInterval(countdownInterval);
                        playSound(880, 0.4);
                        
                        countdownText.style.color = "var(--danger-color)";
                        if (step.exerciseAfter) {
                            countdownText.textContent = "開始休息";
                        } else if (step.restAfter) {
                            countdownText.textContent = "開始訓練";
                        } else {
                            countdownText.textContent = "開始下一個動作";
                        }
                        
                        setTimeout(() => { nextStep(); }, 1000);
                    }
                }, 1000);
            } else if (step.type === "count") {
                countdownText.style.color = "var(--secondary-color)";
                countdownText.textContent = "DONE ➔";
                countdownText.style.cursor = "pointer";
                countdownText.onclick = function() {
                    countdownText.onclick = null;
                    countdownText.style.cursor = "default";
                    countdownText.style.color = "var(--danger-color)";
                    
                    if (activeWorkout.title.includes("體能爆汗")) {
                        countdownText.textContent = "開始下一個動作";
                    } else {
                        countdownText.textContent = "開始休息";
                    }
                    
                    setTimeout(() => { nextStep(); }, 1000);
                };
            }
        }

        function incrementLaps() {
            if (activeWorkout.activeConfig[currentStepIndex].type !== "lapCounter") return;
            currentLaps++;
            playSound(587.33, 0.1);
            
            if (currentLaps >= 6) {
                counterBtn.style.display = 'none';
                playSound(880, 0.4);
                countdownText.style.color = "var(--danger-color)";
                countdownText.textContent = "開始下一個動作";
                setTimeout(() => { nextStep(); }, 1000);
            } else {
                counterBtn.textContent = `折返完成 (目前：${currentLaps} / 6 趟) 🏃‍♂️`;
            }
        }

        function skipRest() {
            clearInterval(countdownInterval);
            skipBtn.style.display = 'none';
            playSound(880, 0.4);
            countdownText.style.color = "var(--danger-color)";
            countdownText.textContent = "開始訓練";
            setTimeout(() => { nextStep(); }, 1000);
        }

        function nextStep() {
            clearInterval(countdownInterval);
            currentStepIndex++;
            
            if (currentStepIndex >= activeWorkout.activeConfig.length) {
                currentStepIndex = 0;
                currentRound++;
                if (currentRound <= activeWorkout.maxRounds) {
                    clearAllHighlights();
                    runPreparation(3, () => { executeStep(); });
                    return;
                }
            }
            executeStep();
        }

        function endWorkout() {
            clearInterval(countdownInterval);
            clearAllHighlights();
            isRunning = false;
            
            startBtn.textContent = "再練一次 💪";
            startBtn.classList.remove('stop-mode');
            skipBtn.style.display = 'none';
            counterBtn.style.display = 'none';

            roundText.textContent = `第 ${activeWorkout.maxRounds} / ${activeWorkout.maxRounds} 組`;
            taskText.textContent = "🎉 恭喜完成今日完整訓練！卓越紀律！";
            countdownText.style.color = "var(--primary-color)";
            countdownText.textContent = "🏆";
            
            setTimeout(() => playSound(523.25, 0.15), 0);
            setTimeout(() => playSound(659.25, 0.15), 150);
            setTimeout(() => playSound(783.99, 0.3), 300);
        }

        function highlightItem(id) {
            clearAllHighlights();
            const el = document.getElementById(`item-${id}`);
            if (el) {
                el.classList.add('active');
                if (activeWorkout.activeConfig[id].isRestStep) el.classList.add('active-rest');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function clearAllHighlights() {
            for (let i = 0; i < 10; i++) {
                const el = document.getElementById(`item-${i}`);
                if (el) {
                    el.className = "workout-item";
                    if (activeWorkout && activeWorkout.activeConfig[i] && activeWorkout.activeConfig[i].isRestStep) {
                        el.className += " rest-item";
                    } else if (!activeWorkout.title.includes("體能爆汗") && (i === 1 || i === 3 || i === 5 || i === 7 || i === 9)) {
                        el.className += " rest-item";
                    }
                }
            }
        }

        function playSound(frequency, duration) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.log("Audio Error:", e);
            }
        }
    </script>
</body>
</html>
