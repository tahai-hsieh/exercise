<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>謝佳杰的裁判養成之路</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #2196F3;
            --accent-color: #FF5722;
            --danger-color: #e74c3c;
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --purple-color: #9b59b6;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container { width: 100%; max-width: 700px; }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 10px;
            margin-bottom: 5px;
            font-size: 1.6rem;
        }
        .daily-quote {
            text-align: center;
            font-size: 0.9rem;
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 20px;
            padding: 0 10px;
            font-weight: 500;
        }

        /* 簽到主頁面板 */
        .home-panel {
            background: var(--card-bg); padding: 16px; border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06); margin-bottom: 20px;
            border-top: 6px solid var(--secondary-color); text-align: center;
        }

        .welcome-title { font-size: 1.25rem; font-weight: bold; color: #2c3e50; margin-top: 0; margin-bottom: 8px; }
        .today-status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; color: white; font-weight: bold; font-size: 1.05rem; margin-bottom: 15px; }
        .status-strength { background-color: var(--accent-color); }
        .status-cardio { background-color: var(--purple-color); }
        .status-rest { background-color: var(--primary-color); }
        .status-makeup { background-color: #f1c40f; color: #333; }
        .today-desc { font-size: 0.95rem; color: #555; background: #f9f9f9; padding: 12px; border-radius: 8px; border-left: 4px solid #ddd; margin-bottom: 16px; text-align: left; }

        .btn-main-action {
            background-color: #2c3e50; color: white; border: none; padding: 12px 25px; font-size: 1.15rem; font-weight: bold; border-radius: 25px; cursor: pointer; margin-bottom: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: all 0.2s; display: none; width: 100%; max-width: 320px;
        }

        .checkin-section { display: flex; align-items: center; justify-content: space-between; background: #edf7ed; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: left; }
        .btn-checkin { background-color: var(--primary-color); color: white; border: none; padding: 10px 16px; font-size: 0.95rem; font-weight: bold; border-radius: 6px; cursor: pointer; flex-shrink: 0; }
        .btn-checkin:disabled { background-color: #bbb; cursor: not-allowed; }

        .missed-checkbox-area { font-size: 0.85rem; color: var(--text-color); display: flex; flex-direction: column; align-items: flex-start; gap: 10px; background: #fff0f0; padding: 12px; border-radius: 8px; border: 1px dashed var(--danger-color); }
        .checkbox-item { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; text-align: left; width: 100%; }
        .checkbox-item input { margin-top: 3px; flex-shrink: 0; }

        /* 訓練計時器控制面板 */
        .control-panel { background: var(--card-bg); padding: 20px 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; margin-bottom: 25px; }
        .btn-start { background-color: var(--primary-color); color: white; border: none; padding: 14px 0; font-size: 1.3rem; font-weight: bold; border-radius: 30px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 280px; }
        .btn-start.stop-mode { background-color: var(--danger-color); }
        .btn-skip { background-color: #7f8c8d; color: white; border: none; padding: 8px 20px; font-size: 0.9rem; border-radius: 15px; cursor: pointer; margin-top: 12px; display: none; width: 100%; max-width: 160px; }
        .btn-counter { background-color: var(--purple-color); color: white; border: none; padding: 18px 20px; font-size: 1.25rem; font-weight: bold; border-radius: 12px; cursor: pointer; margin: 15px 0; display: none; width: 100%; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        /* 音樂控制鍵群組 */
        .music-controls-group {
            display: none; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap;
        }
        .btn-music-action {
            background-color: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db;
            padding: 6px 14px; font-size: 0.85rem; font-weight: bold; border-radius: 20px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-music-action:active { background-color: #e5e7eb; }

        .status-display { margin-top: 15px; }
        .current-round { font-size: 1.1rem; color: #7f8c8d; font-weight: bold; }
        .current-task { font-size: 1.5rem; color: #2c3e50; font-weight: bold; margin: 8px 0; padding: 0 5px; }
        .timer-countdown { font-size: 3.5rem; font-weight: bold; color: var(--accent-color); margin: 5px 0; transition: color 0.2s ease; word-break: break-all; }

        /* 課表清單樣式 */
        .workout-section-title { font-size: 1.2rem; font-weight: bold; color: #2c3e50; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; width: 100%; }
        .workout-list { list-style: none; padding: 0; margin: 0; opacity: 0.8; width: 100%; }
        .workout-item { background: var(--card-bg); border-left: 5px solid #bdc3c7; margin-bottom: 12px; padding: 15px; border-radius: 0 8px 8px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.04); text-align: left; }
        .workout-item.active { border-left-color: var(--accent-color) !important; background: #fff3cd !important; transform: scale(1.01); box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .workout-item.active-rest { border-left-color: var(--secondary-color) !important; background: #eef7ff !important; }
        .workout-title { font-size: 1.1rem; font-weight: bold; margin: 0 0 5px 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .workout-count { color: #e67e22; flex-shrink: 0; font-size: 1rem; }
        .rest-item .workout-count { color: var(--secondary-color); }
        .workout-desc { font-size: 0.85rem; color: #7f8c8d; margin: 5px 0 0 0; }

        /* 隱藏 YouTube 播放器 */
        #yt-player-container {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0;
        }

        @media (min-width: 600px) {
            body { padding: 24px; }
            h1 { font-size: 2rem; margin-bottom: 8px; }
            .daily-quote { font-size: 1.05rem; margin-bottom: 25px; }
            .home-panel { padding: 28px; }
            .welcome-title { font-size: 1.5rem; }
            .today-desc { font-size: 1.05rem; padding: 15px; }
            .missed-checkbox-area { font-size: 0.95rem; padding: 16px; }
            .timer-countdown { font-size: 5rem; margin: 10px 0; }
            .current-task { font-size: 1.8rem; }
            .workout-title { font-size: 1.2rem; }
            .workout-count { font-size: 1.1rem; }
            .workout-desc { font-size: 0.9rem; }
            .workout-item { padding: 18px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🥇 謝佳杰的裁判養成之路</h1>
        <div id="daily-quote-text" class="daily-quote">“ 吹哨要果斷，核心要強悍。新的一週，從建立絕對的場上威嚴開始！ 💪 ”</div>

        <!-- 主頁：簽到與今日課表狀態 -->
        <div class="home-panel">
            <div class="welcome-title" id="welcome-date">今天是星期幾</div>
            <div id="today-badge" class="today-status-badge">載入中...</div>
            <div id="today-desc" class="today-desc">課表內容加載中...</div>

            <center>
                <button id="main-action-btn" class="btn-main-action" onclick="scrollToWorkoutPanel()">進入今日訓練菜單 ➔</button>
            </center>

            <div class="checkin-section">
                <div><span id="checkin-status-text" style="font-size:0.95rem; font-weight:bold;">今日尚未簽到 📝</span></div>
                <button id="checkin-btn" class="btn-checkin" onclick="clickCheckIn()">每日簽到</button>
            </div>

            <div class="missed-checkbox-area">
                <span style="font-weight: bold; color: var(--danger-color); margin-bottom: 2px;">🛠 模擬補簽測試面板 (勾選立刻覆蓋，取消即還原)：</span>
                <label class="checkbox-item">
                    <input type="checkbox" id="mock-strength-cb" onchange="selectMockMode('strength')">
                    <span>勾選模擬「之前有漏掉簽到」<br><small style="color:#666;">（測試核心肌力日補訓用）</small></span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="mock-cardio-cb" onchange="selectMockMode('cardio')">
                    <span>勾選模擬「之前有漏掉簽到」<br><small style="color:#666;">（測試體能爆汗日補訓用）</small></span>
                </label>
            </div>
        </div>

        <!-- 動態訓練計時控制台主區段 -->
        <div id="timer-container-section" style="display: none;">
            <div class="workout-section-title" id="panel-title-text">⏱ 訓練控制台</div>
            
            <div class="control-panel">
                <button id="start-btn" class="btn-start" onclick="toggleWorkout()">開始練習 🚀</button>
                <center>
                    <button id="skip-btn" class="btn-skip" onclick="skipRest()">跳過休息 ⏩</button>
                    <button id="counter-btn" class="btn-counter" onclick="incrementLaps()">折返跑完成 (目前：0 / 6 趟) 🏃‍♂️</button>
                    
                    <!-- 音樂操作按鈕群組 -->
                    <div id="music-ctrl-box" class="music-controls-group">
                        <button class="btn-music-action" onclick="seekMusicPlaylist(5)">+5s ⏩</button>
                        <!-- 🚨 全新暫停/播放按鈕 -->
                        <button id="play-pause-music-btn" class="btn-music-action" onclick="toggleMusicPlayback()">暫停音樂 ⏸️</button>
                        <button class="btn-music-action" onclick="nextTrackPlaylist()">跳過此歌 ⏭️</button>
                    </div>
                </center>
                
                <div id="status-area" class="status-display">
                    <div id="round-text" class="current-round">第 1 組</div>
                    <div id="task-text" class="current-task">準備倒數</div>
                    <div id="countdown-text" class="timer-countdown">3</div>
                </div>
            </div>

            <div class="workout-section-title">📋 當前循環動作清單</div>
            <ul class="workout-list" id="workout-container-list"></ul>
        </div>
    </div>

    <div id="yt-player-container"><div id="yt-api-player"></div></div>

    <script>
        const VIDEO_IDS = [
            "qo478ZnMAsU",
            "Uhut1655qEQ",
            "oewANcF6hVY",
            "0cJuTiX55Ys",
            "zI_IaCD-j34"
        ];

        const dailyQuotes = {
            1: "“ 吹哨要果斷，核心要強悍。新的一週，從建立絕對的場上威嚴開始！ 💪 ”",
            2: "“ 卓越的判決來自於無數次的肌肉記憶，今天的汗水是明天的精準判斷。 ⚡ ”",
            3: "“ 體能是裁判的第二生命，把核心練得跟鋼板一樣硬，場上誰都無法動搖你！ 🔥 ”",
            4: "“ 紀律不是明天的口號，而是今天的每一組分腿蹲與波比跳。 🏋️‍♂️ ”",
            5: "“ 保留最完美的體能，為了週末球場上的全速爆發做準備。 💤 ”",
            6: "“ 20公尺折返跑是速度與意志的對決，跟著節奏，實地轟炸它！ 🏃‍♂️ ”",
            0: "“ 懂得修復與徹底拉伸的裁判，才能在職涯的路上走得比誰都遠。 🛁 ”"
        };

        let ytPlayer = null;
        let isPlayerReady = false;
        let saveMusicInterval = null; 
        let isMusicPlaying = false; // 追蹤音樂當前是否處於播放狀態

        const NORMAL_VOLUME = 50; 
        const DUCKED_VOLUME = 15; 

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-api-player', {
                height: '100', width: '100', videoId: VIDEO_IDS[0],
                playerVars: { 'playlist': VIDEO_IDS.join(','), 'loop': 1 },
                events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerReady(event) {
            isPlayerReady = true;
            ytPlayer.setVolume(NORMAL_VOLUME);
            const savedTrackIndex = localStorage.getItem('yt_last_track_index');
            if (savedTrackIndex === null) ytPlayer.setShuffle(true);
        }

        function onPlayerStateChange(event) {
            if (event.data === 0) {
                if (typeof ytPlayer.getPlaylistIndex === 'function') {
                    const currentIndex = ytPlayer.getPlaylistIndex();
                    if (currentIndex === VIDEO_IDS.length - 1 || currentIndex === -1) {
                        ytPlayer.playVideoAt(0);
                    }
                }
            }
        }

        function fadeVideoVolume(targetVolume, durationMs) {
            if (!isPlayerReady || !ytPlayer || typeof ytPlayer.getVolume !== 'function') return;
            const startVolume = ytPlayer.getVolume();
            const volumeDiff = targetVolume - startVolume;
            if (volumeDiff === 0) return;

            const startTime = performance.now();
            function step(timestamp) {
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / durationMs, 1);
                const currentVol = Math.round(startVolume + (volumeDiff * progress));
                try { ytPlayer.setVolume(currentVol); } catch(e) {}
                if (progress < 1) window.requestAnimationFrame(step);
            }
            window.requestAnimationFrame(step);
        }

        function playMusicPlaylist() {
            if (isPlayerReady && ytPlayer) {
                try {
                    const savedTrackIndex = localStorage.getItem('yt_last_track_index');
                    const savedPosition = localStorage.getItem('yt_last_position');

                    if (savedTrackIndex !== null && savedPosition !== null) {
                        ytPlayer.playVideoAt(parseInt(savedTrackIndex));
                        setTimeout(() => {
                            ytPlayer.seekTo(parseFloat(savedPosition), true);
                            fadeVideoVolume(NORMAL_VOLUME, 200); 
                        }, 600);
                    } else {
                        ytPlayer.playVideo();
                        fadeVideoVolume(NORMAL_VOLUME, 200);
                    }
                    isMusicPlaying = true;
                    document.getElementById('play-pause-music-btn').textContent = "暫停音樂 ⏸️";

                    clearInterval(saveMusicInterval);
                    saveMusicInterval = setInterval(() => {
                        if (ytPlayer && typeof ytPlayer.getPlaylistIndex === 'function') {
                            const currentIndex = ytPlayer.getPlaylistIndex();
                            const currentPos = ytPlayer.getCurrentTime();
                            if (ytPlayer.getPlayerState() === 1 && currentIndex !== -1) {
                                localStorage.setItem('yt_last_track_index', currentIndex.toString());
                                localStorage.setItem('yt_last_position', currentPos.toString());
                            }
                        }
                    }, 2000);
                } catch (e) { console.log("音樂播放失敗：", e); }
            }
        }

        function stopMusicPlaylist() {
            clearInterval(saveMusicInterval); 
            if (isPlayerReady && ytPlayer) {
                try {
                    if (typeof ytPlayer.getPlaylistIndex === 'function' && ytPlayer.getPlaylistIndex() !== -1) {
                        localStorage.setItem('yt_last_track_index', ytPlayer.getPlaylistIndex().toString());
                        localStorage.setItem('yt_last_position', ytPlayer.getCurrentTime().toString());
                    }
                    ytPlayer.pauseVideo();
                    isMusicPlaying = false;
                    document.getElementById('play-pause-music-btn').textContent = "播放音樂 ▶️";
                } catch (e) { console.log("音樂暫停失敗：", e); }
            }
        }

        // 🚨 全新智慧雙向暫停/恢復控制函數（較建議此版本）
        function toggleMusicPlayback() {
            if (!isPlayerReady || !ytPlayer) return;
            
            const btn = document.getElementById('play-pause-music-btn');
            if (isMusicPlaying) {
                // 如果目前在播，平滑降音並暫停
                fadeVideoVolume(0, 200);
                setTimeout(() => {
                    stopMusicPlaylist(); // 內部會精準記帳並切換 isMusicPlaying 狀態
                }, 200);
            } else {
                // 如果目前暫停，啟動續播程式
                playMusicPlaylist();
            }
            playSound(600, 0.05); // 按鈕觸覺反饋
        }

        function seekMusicPlaylist(seconds) {
            if (isPlayerReady && ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
                try {
                    const currentTime = ytPlayer.getCurrentTime();
                    ytPlayer.seekTo(currentTime + seconds, true);
                    playSound(600, 0.05); 
                } catch(e) {}
            }
        }

        function nextTrackPlaylist() {
            if (isPlayerReady && ytPlayer && typeof ytPlayer.nextVideo === 'function') {
                try {
                    const currentIndex = ytPlayer.getPlaylistIndex();
                    if (currentIndex === VIDEO_IDS.length - 1) {
                        ytPlayer.playVideoAt(0);
                    } else {
                        ytPlayer.nextVideo();
                    }
                    isMusicPlaying = true;
                    document.getElementById('play-pause-music-btn').textContent = "暫停音樂 ⏸️";
                    playSound(700, 0.08); 
                    localStorage.setItem('yt_last_position', '0');
                } catch(e) {}
            }
        }

        // 課表清單配置
        const strengthConfig = [
            { id: 0, name: "1. 側棒式轉體 (每邊 12 下)", type: "count" },
            { id: 1, name: "2. 休息", type: "timer", duration: 45, restAfter: true, isRestStep: true },
            { id: 2, name: "3. 保加利亞分腿蹲 (每腿 10 下)", type: "count" },
            { id: 3, name: "4. 休息", type: "timer", duration: 45, restAfter: true, isRestStep: true },
            { id: 4, name: "5. 死蟲式 (左右輪流 20 下)", type: "count" },
            { id: 5, name: "6. 休息", type: "timer", duration: 45, restAfter: true, isRestStep: true },
            { id: 6, name: "7. 仰臥捲腹觸膝 (20 下)", type: "count" },
            { id: 7, name: "8. 休息", type: "timer", duration: 45, restAfter: true, isRestStep: true },
            { id: 8, name: "9. 波比跳", type: "timer", duration: 40, exerciseAfter: true },
            { id: 9, name: "10. 休息", type: "timer", duration: 45, isFinalRest: true, restAfter: true, isRestStep: true }
        ];

        const cardioConfig = [
            { id: 0, name: "1. 動態暖身", type: "timer", duration: 300, exerciseAfter: true }, 
            { id: 1, name: "2. 20公尺連續折返跑 (共 6 趟)", type: "lapCounter" },
            { id: 2, name: "3. 登山者式 (Mountain Climbers)", type: "timer", duration: 30, exerciseAfter: true },
            { id: 3, name: "4. 俄羅斯轉體 (左右各 15 下)", type: "count" },
            { id: 4, name: "5. 組間大休息", type: "timer", duration: 180, isFinalRest: true, restAfter: true, isRestStep: true } 
        ];

        const originalSchedule = {
            1: { type: "strength", name: "核心肌力日 🔥", desc: "🎯 課表：練核心、雕刻腹肌、練單腳力量。", hasTimer: true, maxRounds: 3, activeConfig: strengthConfig, title: "⏱ 核心下肢循環訓練控制台" },
            2: { type: "rest", name: "完全休息日 💤", desc: "🛌 課表：完全休息。修復是為了走更長遠的路！", hasTimer: false },
            3: { type: "strength", name: "核心肌力日 🔥", desc: "🎯 課表：強化核心剛性，讓肚子跟鋼板一樣硬。", hasTimer: true, maxRounds: 3, activeConfig: strengthConfig, title: "⏱ 核心下肢循環訓練控制台" },
            4: { type: "rest", name: "完全休息日 💤", desc: "🛌 課表：完全休息（保留體能給週末）。", hasTimer: false },
            5: { type: "rest", name: "完全休息日 💤", desc: "🛌 課表：完全休息（保留體能給週末）。", hasTimer: false },
            6: { type: "cardio", name: "體能爆汗日 ⚡", desc: "跑場、操場或開音檔，實地轟炸 20 公尺裁判折返跑（Beep Test）與動態腹肌。", hasTimer: true, maxRounds: 4, activeConfig: cardioConfig, title: "⏱ 體能爆汗折返跑訓練控制台" },
            0: { type: "rest", name: "修復放鬆日 🛁", desc: "🧘 課表：徹底拉伸、泡熱水澡恢復。", hasTimer: false }
        };

        function selectMockMode(mode) {
            const strengthCB = document.getElementById('mock-strength-cb');
            const cardioCB = document.getElementById('mock-cardio-cb');
            if (mode === 'strength' && strengthCB.checked) {
                cardioCB.checked = false;
                localStorage.setItem('mockMode', 'strength');
            } else if (mode === 'cardio' && cardioCB.checked) {
                strengthCB.checked = false;
                localStorage.setItem('mockMode', 'cardio');
            } else {
                localStorage.removeItem('mockMode');
            }
            if (isRunning) resetWorkout();
            renderSystemPage();
        }

        function renderSystemPage() {
            document.getElementById('daily-quote-text').textContent = dailyQuotes[todayDay];
            document.getElementById('welcome-date').textContent = `今天是 ${weekNames[todayDay]}`;
            
            const todayStr = new Date().toDateString();
            const isCheckedInToday = (localStorage.getItem('checkedInDate') === todayStr);
            const mockMode = localStorage.getItem('mockMode');

            activeWorkout = { ...originalSchedule[todayDay] };

            if (mockMode === 'strength') {
                document.getElementById('mock-strength-cb').checked = true;
                document.getElementById('mock-cardio-cb').checked = false;
                activeWorkout.type = "makeup"; activeWorkout.hasTimer = true;
                activeWorkout.name = "🚨 測試補簽：核心肌力日菜單";
                activeWorkout.desc = "已強制進入【核心下肢訓練】測試狀態。下方控制台已解鎖，可直接按下「開始練習」進行完整功能測試！";
                activeWorkout.maxRounds = 3; activeWorkout.activeConfig = strengthConfig; activeWorkout.title = "⏱ 核心下肢循環訓練控制台";
            } else if (mockMode === 'cardio') {
                document.getElementById('mock-strength-cb').checked = false;
                document.getElementById('mock-cardio-cb').checked = true;
                activeWorkout.type = "makeup"; activeWorkout.hasTimer = true;
                activeWorkout.name = "🚨 測試補簽：體能爆汗日菜單";
                activeWorkout.desc = "已強制進入【體能爆汗折返跑】測試狀態。下方控制台已解鎖，可直接按下「開始練習」進行完整功能測試！";
                activeWorkout.maxRounds = 4; activeWorkout.activeConfig = cardioConfig; activeWorkout.title = "⏱ 體能爆汗折返跑訓練控制台";
            } else {
                document.getElementById('mock-strength-cb').checked = false;
                document.getElementById('mock-cardio-cb').checked = false;
            }

            const badge = document.getElementById('today-badge');
            badge.textContent = activeWorkout.name;
            badge.className = "today-status-badge status-" + activeWorkout.type;
            document.getElementById('today-desc').textContent = activeWorkout.desc;

            const checkinBtn = document.getElementById('checkin-btn');
            const checkinText = document.getElementById('checkin-status-text');
            if (isCheckedInToday) {
                checkinBtn.disabled = true; checkinBtn.textContent = "已簽到";
                checkinText.innerHTML = "🎉 今日已完成簽到！太棒了！"; checkinText.style.color = "#27ae60";
            } else {
                checkinBtn.disabled = false; checkinBtn.textContent = "每日簽到";
                checkinText.innerHTML = "今日尚未簽到 📝"; checkinText.style.color = "var(--danger-color)";
            }

            if (activeWorkout.hasTimer) {
                mainActionBtn.style.display = 'inline-block';
                timerSection.style.display = 'block';
                document.getElementById('panel-title-text').textContent = activeWorkout.title;
                buildWorkoutListUI(activeWorkout.activeConfig);
            } else {
                mainActionBtn.style.display = 'none';
                timerSection.style.display = 'none';
            }
        }

        function buildWorkoutListUI(configList) {
            listContainer.innerHTML = "";
            configList.forEach(step => {
                const li = document.createElement('li');
                li.className = "workout-item" + (step.isRestStep ? " rest-item" : "");
                li.id = `item-${step.id}`;
                let countText = ""; let descText = "";
                
                if (activeWorkout.title.includes("體能爆汗")) {
                    const cardioDescs = [
                        { count: "5 分鐘", desc: "💡 提示：慢跑、馬克操或動態關節活動，微微出汗預備體能。" },
                        { count: "6 趟", desc: "🏃‍♂️ 提示：實地轟炸 20 公尺裁判折返跑（Beep Test）距離。" },
                        { count: "30 秒", desc: "💡 提示：撐地伏地挺身姿勢，雙腳快速交替往前收至胸前，維持核心穩定。" },
                        { count: "左右各 15 下", desc: "💡 提示：坐在地上軀幹微後仰，雙腳微懸空，雙手左右交替觸地轉體。" },
                        { count: "3 分鐘", desc: "☕ 提示：徹底深呼吸放鬆，補充水分，準備下一組爆發（第4組免休息）。" }
                    ];
                    countText = cardioDescs[step.id].count; descText = cardioDescs[step.id].desc;
                } else {
                    const strengthDescs = [
                        { count: "每邊 12 下", desc: "💡 提示：手肘撐地維持側棒式，上手往身體下方延伸，再帶回向上延伸。" },
                        { count: "45 秒", desc: "" },
                        { count: "每腿 10 下", desc: "💡 提示：後腳抬高踩在椅面，重心在前腳，垂直下蹲至前大腿與地面平行。" },
                        { count: "45 秒", desc: "" },
                        { count: "左右輪流 20 下", desc: "💡 提示：平躺雙手朝天、雙膝彎曲 90 度。對側手腳同時向外延伸，下背緊貼地面。" },
                        { count: "45 秒", desc: "" },
                        { count: "20 下", desc: "💡 提示：平躺雙腳踩地，吐氣時用腹肌力量將上半身捲起，雙手摸到膝蓋。" },
                        { count: "45 秒", desc: "" },
                        { count: "持續 40 秒", desc: "💡 提示：下蹲後跳、跳回再向上爆發跳躍。請維持固定節奏。" },
                        { count: "45 秒", desc: "第3組免休息" }
                    ];
                    countText = strengthDescs[step.id].count; descText = strengthDescs[step.id].desc;
                }
                li.innerHTML = `<div class="workout-title"><span>${step.name}</span><span class="workout-count">${countText}</span></div>${descText ? `<p class="workout-desc">${descText}</p>` : ''}`;
                listContainer.appendChild(li);
            });
        }

        function scrollToWorkoutPanel() { timerSection.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
        function clickCheckIn() { localStorage.setItem('checkedInDate', new Date().toDateString()); alert("簽到成功！今天也要保持紀律，繼續加油！🔥"); renderSystemPage(); }
        function formatTimeDisplay(totalSeconds) { if (totalSeconds >= 60) { return `${Math.floor(totalSeconds / 60)}分${totalSeconds % 60}秒`; } return `${totalSeconds}s`; }

        function toggleWorkout() {
            if (!isRunning) {
                isRunning = true; startBtn.textContent = "停止訓練 ⏹️"; startBtn.classList.add('stop-mode');
                musicCtrlBox.style.display = 'flex';
                playMusicPlaylist(); initWorkout();
            } else { resetWorkout(); }
        }

        function resetWorkout() {
            clearInterval(countdownInterval); isRunning = false; currentRound = 1; currentStepIndex = 0; currentLaps = 0;
            startBtn.textContent = "開始練習 🚀"; startBtn.classList.remove('stop-mode');
            statusArea.style.display = 'none'; skipBtn.style.display = 'none'; counterBtn.style.display = 'none'; musicCtrlBox.style.display = 'none';
            clearAllHighlights(); countdownText.onclick = null; countdownText.style.cursor = "default";
            stopMusicPlaylist();
        }

        function initWorkout() {
            statusArea.style.display = 'block'; currentRound = 1; currentStepIndex = 0; currentLaps = 0; clearAllHighlights();
            
            // 如果暫停按鈕之前被使用者按過導致音樂沒播，開局依然會強制降音解鎖
            if (isMusicPlaying) fadeVideoVolume(DUCKED_VOLUME, 150);
            
            runPreparation(3, () => { executeStep(); });
        }

        function runPreparation(seconds, callback) {
            taskText.textContent = "準備倒數"; skipBtn.style.display = 'none'; counterBtn.style.display = 'none';
            countdownText.style.color = "var(--accent-color)"; countdownText.textContent = seconds; playSound(440, 0.1);
            let sec = seconds;
            countdownInterval = setInterval(() => {
                sec--;
                if (sec > 0) { countdownText.textContent = sec; playSound(440, 0.1); }
                else if (sec === 0) { countdownText.textContent = "開始！"; playSound(880, 0.3); }
                else { clearInterval(countdownInterval); callback(); }
            }, 1000);
        }

        function executeStep() {
            if (currentRound > activeWorkout.maxRounds) { endWorkout(); return; }
            const step = activeWorkout.activeConfig[currentStepIndex];
            if (currentRound === activeWorkout.maxRounds && step.isFinalRest) { endWorkout(); return; }

            roundText.textContent = `第 ${currentRound} / ${activeWorkout.maxRounds} 組`;
            taskText.textContent = step.name; highlightItem(step.id);
            skipBtn.style.display = (step.isRestStep) ? 'inline-block' : 'none';
            
            if (step.type === "lapCounter") {
                counterBtn.style.display = 'inline-block'; currentLaps = 0;
                counterBtn.textContent = `折返跑完成 (目前：${currentLaps} / 6 趟) 🏃‍♂️`;
                countdownText.style.color = "var(--purple-color)"; countdownText.textContent = "RUN!";
                if (isMusicPlaying) fadeVideoVolume(NORMAL_VOLUME, 300); 
                return;
            } else { counterBtn.style.display = 'none'; }

            if (step.type === "timer") {
                let timeLeft = step.duration;
                if (timeLeft <= 5) { 
                    if (isMusicPlaying) fadeVideoVolume(DUCKED_VOLUME, 150); 
                    countdownText.style.color = "var(--danger-color)"; 
                } else { 
                    if (isMusicPlaying) fadeVideoVolume(NORMAL_VOLUME, 300); 
                    countdownText.style.color = "var(--accent-color)"; 
                }
                countdownText.textContent = formatTimeDisplay(timeLeft);
                
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft > 0) {
                        countdownText.textContent = formatTimeDisplay(timeLeft);
                        if (timeLeft <= 5) {
                            countdownText.style.color = "var(--danger-color)";
                            if (timeLeft === 5 && isMusicPlaying) fadeVideoVolume(DUCKED_VOLUME, 300);
                            playSound(550, 0.1);
                        }
                    } else {
                        clearInterval(countdownInterval); playSound(880, 0.4);
                        countdownText.style.color = "var(--danger-color)";
                        if (step.exerciseAfter) countdownText.textContent = "開始休息";
                        else if (step.restAfter) countdownText.textContent = "開始訓練";
                        else countdownText.textContent = "開始下一個動作";
                        setTimeout(() => { nextStep(); }, 1000);
                    }
                }, 1000);
            } else if (step.type === "count") {
                if (isMusicPlaying) fadeVideoVolume(NORMAL_VOLUME, 300);
                countdownText.style.color = "var(--secondary-color)"; countdownText.textContent = "DONE ➔"; countdownText.style.cursor = "pointer";
                countdownText.onclick = function() {
                    countdownText.onclick = null; countdownText.style.cursor = "default"; countdownText.style.color = "var(--danger-color)";
                    if (isMusicPlaying) fadeVideoVolume(DUCKED_VOLUME, 150);
                    if (activeWorkout.title.includes("體能爆汗")) countdownText.textContent = "開始下一個動作";
                    else countdownText.textContent = "開始休息";
                    setTimeout(() => { nextStep(); }, 1000);
                };
            }
        }

        function incrementLaps() {
            if (activeWorkout.activeConfig[currentStepIndex].type !== "lapCounter") return;
            currentLaps++; playSound(587.33, 0.1);
            if (currentLaps >= 6) {
                counterBtn.style.display = 'none'; playSound(880, 0.4);
                if (isMusicPlaying) fadeVideoVolume(DUCKED_VOLUME, 150); 
                countdownText.style.color = "var(--danger-color)"; countdownText.textContent = "開始下一個動作";
                setTimeout(() => { nextStep(); }, 1000);
            } else { counterBtn.textContent = `折返跑完成 (目前：${currentLaps} / 6 趟) 🏃‍♂️`; }
        }

        function skipRest() {
            clearInterval(countdownInterval); skipBtn.style.display = 'none'; playSound(880, 0.4);
            if (isMusicPlaying) fadeVideoVolume(DUCKED_VOLUME, 150); 
            countdownText.style.color = "var(--danger-color)"; countdownText.textContent = "開始訓練";
            setTimeout(() => { nextStep(); }, 1000);
        }

        function nextStep() {
            clearInterval(countdownInterval); currentStepIndex++;
            if (currentStepIndex >= activeWorkout.activeConfig.length) {
                currentStepIndex = 0; currentRound++;
                if (currentRound <= activeWorkout.maxRounds) {
                    clearAllHighlights(); 
                    if (isMusicPlaying) fadeVideoVolume(DUCKED_VOLUME, 150);
                    runPreparation(3, () => { executeStep(); }); return;
                }
            }
            executeStep();
        }

        function endWorkout() {
            clearInterval(countdownInterval); clearAllHighlights(); isRunning = false;
            startBtn.textContent = "再練一次 💪"; startBtn.classList.remove('stop-mode');
            skipBtn.style.display = 'none'; counterBtn.style.display = 'none'; musicCtrlBox.style.display = 'none';
            roundText.textContent = `第 ${activeWorkout.maxRounds} / ${activeWorkout.maxRounds} 組`;
            taskText.textContent = "🎉 恭喜完成今日完整訓練！卓越紀律！";
            countdownText.style.color = "var(--primary-color)"; countdownText.textContent = "🏆";
            stopMusicPlaylist(); 
            setTimeout(() => playSound(523.25, 0.15), 0);
            setTimeout(() => playSound(659.25, 0.15), 150);
            setTimeout(() => playSound(783.99, 0.3), 300);
        }

        function highlightItem(id) {
            clearAllHighlights();
            const el = document.getElementById(`item-${id}`);
            if (el) { el.classList.add('active'); if (activeWorkout.activeConfig[id].isRestStep) el.classList.add('active-rest'); }
        }

        function clearAllHighlights() {
            for (let i = 0; i < 10; i++) {
                const el = document.getElementById(`item-${i}`);
                if (el) {
                    el.className = "workout-item";
                    if (activeWorkout && activeWorkout.activeConfig[i] && activeWorkout.activeConfig[i].isRestStep) el.className += " rest-item";
                    else if (activeWorkout && !activeWorkout.title.includes("體能爆汗") && (i === 1 || i === 3 || i === 5 || i === 7 || i === 9)) el.className += " rest-item";
                }
            }
        }

        function playSound(frequency, duration) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
                oscillator.type = 'sine'; oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime); oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination); oscillator.start(); oscillator.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }
    </script>
</body>
